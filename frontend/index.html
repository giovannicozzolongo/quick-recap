<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Recap</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1><span class="accent">Quick</span> Recap</h1>
            <p class="tagline">Paste text or record your voice. Get a clean, organized recap.</p>
        </header>

        <section class="input-section">
            <div class="input-columns">
                <div class="input-col">
                    <div class="col-header">
                        <span class="col-title">Text</span>
                        <button class="reset-btn" onclick="resetText()" title="Clear text">Clear</button>
                    </div>
                    <textarea id="text-input" placeholder="Paste your text here (meeting notes, article, lecture transcript, anything)..." rows="8" maxlength="10000" oninput="updateCharCount()"></textarea>
                <div class="char-count" id="char-count">0 / 10,000</div>
                </div>

                <div class="input-divider"></div>

                <div class="input-col">
                    <div class="col-header">
                        <span class="col-title">Voice</span>
                        <button class="reset-btn" onclick="resetVoice()" title="Clear recording">Clear</button>
                    </div>
                    <div class="voice-panel">
                        <div class="voice-controls">
                            <button class="record-btn" id="record-btn" onclick="toggleRecording()">
                                <span class="record-icon" id="record-icon">&#9679;</span>
                                <span id="record-label">Record</span>
                            </button>
                            <button class="pause-btn" id="pause-btn" onclick="togglePause()" style="display:none;">
                                <span id="pause-label">Pause</span>
                            </button>
                            <button class="stop-btn" id="stop-btn" onclick="stopRecording()" style="display:none;">Stop</button>
                            <span class="recording-time" id="recording-time"></span>
                        </div>
                        <div class="transcript-preview" id="transcript-preview" style="display:none;">
                            <label>Transcript:</label>
                            <p id="transcript-text"></p>
                        </div>
                    </div>
                </div>
            </div>

            <button class="analyze-btn" id="analyze-btn" onclick="analyze()">Recap</button>
        </section>

        <div class="status-bar" id="status-bar" style="display:none;">
            <div class="status-dot"></div>
            <span id="status-text"></span>
        </div>

        <section class="result-section" id="result-section" style="display:none;">
            <div class="result-header">Recap</div>
            <div class="result-body" id="result-body"></div>
        </section>

        <footer class="footer">
            <p>Quick Recap / AI text synthesizer / FastAPI + Whisper</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
